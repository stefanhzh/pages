<style>
:root{
  --bg:#fdfdfc; --fg:#1a1a1a; --muted:#666; --accent:#0f6b8c;
  --border:#e3e2de; --code-bg:#f2f1ee; --quote:#8a6d3b;
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#191a1c; --fg:#e6e4df; --muted:#9a9a94; --accent:#6db6d4;
         --border:#333; --code-bg:#26272a; --quote:#c9a86a; }
}
*{ box-sizing:border-box; }
html{ -webkit-text-size-adjust:100%; }
body{
  margin:0; background:var(--bg); color:var(--fg);
  font:16px/1.75 -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Segoe UI",sans-serif;
}
main{ max-width:720px; margin:0 auto; padding:clamp(16px,4vw,40px); overflow-wrap:break-word; }
h1{ font-size:clamp(1.5rem,5vw,2.1rem); line-height:1.3; margin:.5em 0; }
h2{ font-size:clamp(1.25rem,4vw,1.5rem); line-height:1.35; margin:1.6em 0 .6em;
    padding-bottom:.3em; border-bottom:1px solid var(--border); }
h3{ font-size:clamp(1.1rem,3.5vw,1.2rem); margin:1.4em 0 .5em; }
p{ margin:.8em 0; }
a{ color:var(--accent); word-break:break-all; }
hr{ border:none; border-top:1px solid var(--border); margin:2em 0; }
blockquote{ margin:1em 0; padding:.2em 1em; border-left:3px solid var(--quote);
            color:var(--muted); background:var(--code-bg); border-radius:0 6px 6px 0; }
ul,ol{ padding-left:1.4em; margin:.8em 0; }
li{ margin:.3em 0; }
code{ background:var(--code-bg); padding:.15em .4em; border-radius:4px;
      font-family:ui-monospace,SFMono-Regular,Consolas,Menlo,monospace; font-size:.9em; }
pre{ background:var(--code-bg); padding:1em; border-radius:8px; overflow-x:auto; }
pre code{ background:none; padding:0; }
.tablewrap{ overflow-x:auto; margin:1em 0; -webkit-overflow-scrolling:touch; }
table{ border-collapse:collapse; width:100%; min-width:320px; font-size:.95em; }
th,td{ border:1px solid var(--border); padding:.5em .7em; text-align:left; vertical-align:top; }
th{ background:var(--code-bg); }
img,svg{ max-width:100%; height:auto; }
strong{ font-weight:600; }
.meta{ color:var(--muted); font-size:.85em; }
</style>

<main id="app"></main>
<script>
(function(){
"use strict";
var src = document.getElementById("content").textContent;
var IMAGES = {};
try { IMAGES = JSON.parse(document.getElementById("images").textContent || "{}"); } catch(e){}

function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function inline(s){
  s = esc(s);
  s = s.replace(/`([^`]+)`/g, function(_,c){ return "<code>"+c+"</code>"; });
  s = s.replace(/!\[([^\]]*)\]\(([^)\s]+)\)/g, function(_,alt,ref){
    var u = ref.charAt(0)==="#" ? (IMAGES[ref.slice(1)]||"") : ref;
    if(!u) return '<span class="meta">[图片缺失: '+ref+']</span>';
    return '<figure style="margin:1em 0"><img alt="'+alt+'" src="'+u+'">'+(alt?'<figcaption class="meta">'+alt+'</figcaption>':'')+'</figure>';
  });
  s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/(^|[^*\w])\*([^*\n]+)\*/g, "$1<em>$2</em>");
  return s;
}

function render(md){
  var lines = md.replace(/\r\n/g,"\n").split("\n");
  var out = [], i = 0;
  function isTableRow(l){ return /^\s*\|.*\|\s*$/.test(l); }
  while(i < lines.length){
    var l = lines[i];

    if(/^\s*```/.test(l)){                      // code fence
      var buf=[]; i++;
      while(i<lines.length && !/^\s*```/.test(lines[i])){ buf.push(lines[i]); i++; }
      i++;
      out.push("<pre><code>"+esc(buf.join("\n"))+"</code></pre>");
      continue;
    }
    if(/^\s*<\S/.test(l)){                      // raw HTML passthrough (e.g. inline SVG)
      var buf=[l]; i++;
      while(i<lines.length && lines[i].trim()!==""){ buf.push(lines[i]); i++; }
      out.push(buf.join("\n"));
      continue;
    }
    if(/^\s*(-{3,}|\*{3,})\s*$/.test(l)){ out.push("<hr>"); i++; continue; }
    var h = l.match(/^(#{1,4})\s+(.*)/);
    if(h){ var n=h[1].length; out.push("<h"+n+">"+inline(h[2])+"</h"+n+">"); i++; continue; }
    if(/^\s*>\s?/.test(l)){                     // blockquote
      var buf=[];
      while(i<lines.length && /^\s*>\s?/.test(lines[i])){ buf.push(lines[i].replace(/^\s*>\s?/,"")); i++; }
      out.push("<blockquote>"+render(buf.join("\n"))+"</blockquote>");
      continue;
    }
    if(isTableRow(l) && i+1<lines.length && /^\s*\|[\s:|-]+\|\s*$/.test(lines[i+1])){  // table
      var head = l, rows=[]; i+=2;
      while(i<lines.length && isTableRow(lines[i])){ rows.push(lines[i]); i++; }
      function cells(r){ return r.trim().replace(/^\||\|$/g,"").split("|").map(function(c){return inline(c.trim());}); }
      var html = "<div class=tablewrap><table><thead><tr>";
      cells(head).forEach(function(c){ html+="<th>"+c+"</th>"; });
      html += "</tr></thead><tbody>";
      rows.forEach(function(r){
        html+="<tr>"; cells(r).forEach(function(c){ html+="<td>"+c+"</td>"; }); html+="</tr>";
      });
      out.push(html+"</tbody></table></div>");
      continue;
    }
    var ulm = l.match(/^(\s*)[-*]\s+(.*)/), olm = l.match(/^(\s*)\d+[.)]\s+(.*)/);
    if(ulm || olm){                             // list (supports one nesting level)
      var tag = ulm ? "ul" : "ol";
      var items=[];
      var re = ulm ? /^(\s*)[-*]\s+(.*)/ : /^(\s*)\d+[.)]\s+(.*)/;
      while(i<lines.length){
        var m = lines[i].match(/^(\s*)([-*]|\d+[.)])\s+(.*)/);
        if(!m) break;
        items.push({indent:m[1].length, text:m[3]});
        i++;
      }
      var html="<"+tag+">", depth=0;
      items.forEach(function(it,idx){
        var lvl = it.indent>=2 ? 1 : 0;
        if(lvl>depth){ html+="<ul>"; depth=1; }
        else if(lvl<depth){ html+="</ul>"; depth=0; }
        html+="<li>"+inline(it.text)+"</li>";
      });
      if(depth>0) html+="</ul>";
      out.push(html+"</"+tag+">");
      continue;
    }
    if(l.trim()===""){ i++; continue; }
    var buf=[l]; i++;                           // paragraph
    while(i<lines.length && lines[i].trim()!=="" &&
          !/^(#{1,4}\s|\s*[-*]\s|\s*\d+[.)]\s|\s*>|\s*```|\s*\|)/.test(lines[i])){
      buf.push(lines[i]); i++;
    }
    out.push("<p>"+inline(buf.join(" "))+"</p>");
  }
  return out.join("\n");
}

document.getElementById("app").innerHTML = render(src);
var h1 = document.querySelector("h1");
if(h1 && document.title.indexOf("【")===0) document.title = h1.textContent;
})();
</script>
